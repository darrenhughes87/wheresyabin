  <rect width="512" height="512" rx="128" fill="#16a34a"/>
  <!-- Bin body -->
  <rect x="148" y="208" width="216" height="224" rx="16" fill="#fff"/>
  <!-- Bin lid -->
  <rect x="128" y="168" width="256" height="40" rx="12" fill="#dcfce7"/>
  <!-- Lid handle -->
