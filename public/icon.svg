  <!-- Bin stripes (recycling lines) -->
  <rect x="196" y="240" width="12" height="160" rx="6" fill="#16a34a" opacity="0.25"/>
  <rect x="250" y="240" width="12" height="160" rx="6" fill="#16a34a" opacity="0.25"/>
  <rect x="304" y="240" width="12" height="160" rx="6" fill="#16a34a" opacity="0.25"/>
</svg>
